<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Digital Newsstand</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>

<header>
    <nav>
        <div class="logo">Digital Platform — Admin</div>
        <div class="nav-links">
            <span id="adminName"></span>
            <a href="#" id="logoutBtn">Logout</a>
        </div>
    </nav>
</header>

<main>
    <section class="admin-section">
        <div class="tab-titles">
            <h2 id="articlesTab" class="activeBtn disableBtn">Manage Articles</h2>
            <h2 id="usersTab" class="disableBtn">Manage Users</h2>
            <h2 id="categoriesTab" class="disableBtn">Manage Categories</h2>
        </div>

        <!-- ── Articles Section ── -->
        <div id="articlesSection">
            <div class="action-buttons">
                <button id="addArticleBtn">Add Article</button>
                <button id="removeArticleBtn">Remove Article</button>
                <button id="updateArticleBtn">Update Article</button>
            </div>

            <form id="addArticleForm" class="content-form">
                <h3>Add New Article</h3>
                <input type="text"   id="articleTitle"    placeholder="Article Title"   required>
                <textarea            id="articleSummary"  placeholder="Article Content" required></textarea>
                <input type="url"    id="articleImage"    placeholder="Image URL"       required>
                <input type="text"   id="articleCategory" placeholder="Category ID"     required>
                <input type="text"   id="articleLanguage" placeholder="Language ID"     required>
                <button type="submit">Add Article</button>
            </form>

            <form id="removeArticleForm" class="content-form" style="display:none;">
                <h3>Remove Article</h3>
                <input type="number" id="articleIdToRemove" placeholder="Article ID to Remove" required>
                <button type="submit">Remove Article</button>
            </form>

            <form id="updateArticleForm" class="content-form" style="display:none;">
                <h3>Update Article</h3>
                <input type="number" id="articleIdToUpdate" placeholder="Article ID to Update" required>
                <input type="text"   id="updatedTitle"      placeholder="New Title"            required>
                <textarea            id="updatedSummary"    placeholder="New Content"          required></textarea>
                <input type="url"    id="updatedImage"      placeholder="New Image URL"        required>
                <input type="text"   id="updatedCategory"   placeholder="New Category ID"      required>
                <input type="text"   id="updatedLanguage"   placeholder="New Language ID"      required>
                <button type="submit">Update Article</button>
            </form>
        </div>

        <!-- ── Users Section ── -->
        <div id="usersSection" style="display:none;">
            <h3>All Users</h3>
            <div id="usersMsg" class="error-message" style="display:none;"></div>
            <table id="usersTable" border="1" cellpadding="8" style="width:100%; border-collapse:collapse;">
                <thead>
                    <tr>
                        <th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Change Role</th><th>Delete</th>
                    </tr>
                </thead>
                <tbody id="usersBody"></tbody>
            </table>
        </div>

        <!-- ── Categories Section ── -->
        <div id="categoriesSection" style="display:none;">
            <div class="action-buttons">
                <button id="addCategoryBtn">Add Category</button>
                <button id="refreshCategoriesBtn">Refresh List</button>
            </div>

            <!-- Add form -->
            <form id="addCategoryForm" class="content-form">
                <h3>Add Category</h3>
                <input type="text" id="categoryName" placeholder="Category Name" required>
                <input type="text" id="categoryIcon" placeholder="Icon (emoji)" maxlength="10">
                <button type="submit">Add Category</button>
            </form>

            <!-- Existing categories table -->
            <h3 style="margin-top:2rem;">Existing Categories</h3>
            <table id="categoriesTable" border="1" cellpadding="8" style="width:100%; border-collapse:collapse;">
                <thead>
                    <tr><th>ID</th><th>Name</th><th>Icon</th><th>Action</th></tr>
                </thead>
                <tbody id="categoriesBody"></tbody>
            </table>
        </div>

    </section>
</main>

<footer>
    <div class="footer-bottom">
        <p>&copy; 2024 Digital Platform. All Rights Reserved</p>
    </div>
</footer>

<script>
    const BASE = '/Secure_DigitalNewsstand';

    // ── Guard: verify session and admin role on page load ──────────────────
    async function checkAuth() {
        try {
            const res  = await fetch(`${BASE}/auth/me`, { credentials: 'include' });
            if (!res.ok) { window.location.href = '../Auth/index.html'; return; }
            const data = await res.json();
            if (data.userRole !== 1) { window.location.href = '../Auth/index.html'; return; }
            document.getElementById('adminName').textContent = 'Hello, ' + data.userName;
        } catch {
            window.location.href = '../Auth/index.html';
        }
    }
    checkAuth();

    // ── Logout ─────────────────────────────────────────────────────────────
    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
        e.preventDefault();
        await fetch(`${BASE}/auth/logout`, { method: 'POST', credentials: 'include' });
        window.location.href = '../Auth/index.html';
    });

    // ── Tab switching ──────────────────────────────────────────────────────
    const tabs = {
        articlesTab:   'articlesSection',
        usersTab:      'usersSection',
        categoriesTab: 'categoriesSection'
    };
    Object.keys(tabs).forEach(tabId => {
        document.getElementById(tabId).addEventListener('click', () => {
            Object.keys(tabs).forEach(t => {
                document.getElementById(t).classList.remove('activeBtn');
                document.getElementById(tabs[t]).style.display = 'none';
            });
            document.getElementById(tabId).classList.add('activeBtn');
            document.getElementById(tabs[tabId]).style.display = 'block';
            if (tabId === 'usersTab') loadUsers();
            if (tabId === 'categoriesTab') loadCategories();   // ← added
        });
    });

    // ── Article button toggles ─────────────────────────────────────────────
    ['addArticleBtn','removeArticleBtn','updateArticleBtn'].forEach((btnId, i) => {
        const forms = ['addArticleForm','removeArticleForm','updateArticleForm'];
        document.getElementById(btnId).addEventListener('click', () => {
            forms.forEach((f, j) => {
                document.getElementById(f).style.display = (i === j) ? 'block' : 'none';
            });
        });
    });

    // ── Article forms → Java API ───────────────────────────────────────────
    document.getElementById('addArticleForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const body = {
            articleTitle:   document.getElementById('articleTitle').value,
            articleContent: document.getElementById('articleSummary').value,
            articleImg:     document.getElementById('articleImage').value,
            categoryId:     parseInt(document.getElementById('articleCategory').value),
            languageId:     parseInt(document.getElementById('articleLanguage').value)
        };
        const res = await fetch(`${BASE}/api/articles`, {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        alert(res.ok ? 'Article added!' : 'Failed to add article.');
    });

    document.getElementById('removeArticleForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id  = document.getElementById('articleIdToRemove').value;
        const res = await fetch(`${BASE}/api/articles/${id}`, {
            method: 'DELETE', credentials: 'include'
        });
        alert(res.ok ? 'Article removed!' : 'Failed to remove article.');
    });

    document.getElementById('updateArticleForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id   = document.getElementById('articleIdToUpdate').value;
        const body = {
            articleTitle:   document.getElementById('updatedTitle').value,
            articleContent: document.getElementById('updatedSummary').value,
            articleImg:     document.getElementById('updatedImage').value,
            categoryId:     parseInt(document.getElementById('updatedCategory').value),
            languageId:     parseInt(document.getElementById('updatedLanguage').value)
        };
        const res = await fetch(`${BASE}/api/articles/${id}`, {
            method: 'PUT', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        alert(res.ok ? 'Article updated!' : 'Failed to update article.');
    });

    // ── Categories section ─────────────────────────────────────────────────
    // Load categories into a table with delete buttons
    async function loadCategories() {
        const tbody = document.getElementById('categoriesBody');
        tbody.innerHTML = '<tr><td colspan="4">Loading...</td></tr>';
        try {
            const res  = await fetch(`${BASE}/api/categories`, { credentials: 'include' });
            const data = await res.json();
            if (!res.ok) {
                tbody.innerHTML = '<tr><td colspan="4">Failed to load categories.</td></tr>';
                return;
            }
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">No categories found.</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(cat => `
                <tr>
                    <td>${cat.id}</td>
                    <td>${cat.name}</td>
                    <td>${cat.icon || '—'}</td>
                    <td><button class="delete-cat-btn" data-id="${cat.id}">Delete</button></td>
                </tr>
            `).join('');

            // Attach delete handlers
            document.querySelectorAll('.delete-cat-btn').forEach(btn => {
                btn.addEventListener('click', async function () {
                    const catId = this.dataset.id;
                    if (!confirm(`Delete category #${catId}?`)) return;
                    const res = await fetch(`${BASE}/api/categories/${catId}`, {
                        method: 'DELETE',
                        credentials: 'include'
                    });
                    if (res.ok) {
                        alert('Category deleted.');
                        loadCategories();
                    } else {
                        alert('Failed to delete. It may be in use by articles, or you need the correct ID.');
                    }
                });
            });
        } catch (err) {
            tbody.innerHTML = '<tr><td colspan="4">Error loading categories.</td></tr>';
        }
    }

    // Add category form (refreshes table after success)
    document.getElementById('addCategoryForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('categoryName').value.trim();
        const icon = document.getElementById('categoryIcon').value.trim();
        const res = await fetch(`${BASE}/api/categories`, {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ categoryName: name, icon: icon || null })
        });
        if (res.ok) {
            alert('Category added!');
            document.getElementById('categoryName').value = '';
            document.getElementById('categoryIcon').value = '';
            loadCategories();   // refresh table
        } else {
            alert('Failed to add category.');
        }
    });

    // The old removeCategoryForm is no longer needed – removed.
    // If you kept the removeCategoryForm in HTML, you can simply remove its <form> block,
    // or leave it hidden; the above code will not interfere.

    // Refresh button handler
    document.getElementById('refreshCategoriesBtn').addEventListener('click', loadCategories);

    // ── Load users from Java API ───────────────────────────────────────────
    async function loadUsers() {
        const msg = document.getElementById('usersMsg');
        try {
            const res  = await fetch(`${BASE}/api/admin/users`, { credentials: 'include' });
            const data = await res.json();
            if (!res.ok) { msg.textContent = data.error; msg.style.display = 'block'; return; }

            const roleNames = { 1: 'Admin', 2: 'Regular', 3: 'Basic', 4: 'Standard', 5: 'Premium' };
            const tbody = document.getElementById('usersBody');
            tbody.innerHTML = '';
            data.forEach(user => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${user.userId}</td>
                    <td>${user.userName}</td>
                    <td>${user.userEmail}</td>
                    <td>${roleNames[user.userRole] || user.userRole}</td>
                    <td>
                        <select id="role_${user.userId}">
                            <option value="1" ${user.userRole===1?'selected':''}>Admin</option>
                            <option value="2" ${user.userRole===2?'selected':''}>Regular</option>
                            <option value="3" ${user.userRole===3?'selected':''}>Basic</option>
                            <option value="4" ${user.userRole===4?'selected':''}>Standard</option>
                            <option value="5" ${user.userRole===5?'selected':''}>Premium</option>
                        </select>
                        <button onclick="changeRole(${user.userId})">Save</button>
                    </td>
                    <td><button onclick="deleteUser(${user.userId})">Delete</button></td>
                `;
                tbody.appendChild(tr);
            });
        } catch {
            msg.textContent = 'Failed to load users.';
            msg.style.display = 'block';
        }
    }

    async function changeRole(userId) {
        const newRoleId = parseInt(document.getElementById(`role_${userId}`).value);
        const res = await fetch(`${BASE}/api/admin/users/role`, {
            method: 'PUT', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId, newRoleId })
        });
        alert(res.ok ? 'Role updated!' : 'Failed to update role.');
        loadUsers();
    }

    async function deleteUser(userId) {
        if (!confirm('Are you sure you want to delete this user?')) return;
        const res = await fetch(`${BASE}/api/admin/users/${userId}`, {
            method: 'DELETE', credentials: 'include'
        });
        alert(res.ok ? 'User deleted.' : 'Failed to delete user.');
        loadUsers();
    }
</script>

</body>
</html>
