<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Digital Newsstand</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/index.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Digital Platform</div>
            <div class="nav-links">
                <a href="arabic-login.html" class="active">العربية</a>
                <a href="index.html">English</a>
            </div>
        </nav>
    </header>

    <main class="login-container">
        <div class="login-box">
            <h2>تسجيل الدخول</h2>
            <div id="errorMsg" class="error-message" style="display:none;"></div>
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="email">البريد الالكتروني</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember"> تذكرني لاحقاً
                    </label>
                    <a href="#" class="forgot-password">هل نسيت كلمة السر؟</a>
                </div>
                <button type="submit" class="login-button">تسجيل الدخول</button>
            </form>
            <div class="register-link">
                <p>لا تمتلك حساب؟ <a href="arabic-register.html">أنشاء حساب</a></p>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-bottom">
            <p>&copy; 2024 Digital Platform. All Rights Reserved</p>
        </div>
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.style.display = 'none';
            try {
                const response = await fetch('/Secure_DigitalNewsstand/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ userEmail: email, userPassword: password })
                });
                const data = await response.json();
                if (response.ok) {
                    window.location.href = data.userRole === 1
                        ? '../Admin/admin.html'
                        : '../Client/account.html';
                } else {
                    errorDiv.textContent = data.error || 'البريد الإلكتروني أو كلمة المرور غير صحيحة.';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'تعذر الاتصال بالخادم. حاول مجدداً.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
