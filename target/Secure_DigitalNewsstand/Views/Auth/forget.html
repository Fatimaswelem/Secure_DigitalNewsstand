<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Digital Newsstand</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/index.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Digital Platform</div>
            <div class="nav-links">
                <a href="arabic-login.html">العربية</a>
                <a href="index.html" class="active">English</a>
            </div>
        </nav>
    </header>

    <main class="login-container">
        <div class="login-box">
            <h2>Forgot Password</h2>
            <div id="statusMsg" style="display:none; padding:12px 16px; margin:15px 0; border-radius:6px; font-size:14px;"></div>
            <form class="login-form" id="forgotPasswordForm">
                <div class="form-group">
                    <label for="email">Enter your email address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <button class="login-button" type="submit">Send Reset Link</button>
                <div class="register-link">
                    <p>Remember your password? <a href="index.html">Go back to Login</a></p>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-bottom">
            <p>&copy; 2024 Digital Platform. All Rights Reserved</p>
        </div>
    </footer>

    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email     = document.getElementById('email').value.trim();
            const statusDiv = document.getElementById('statusMsg');

            // Note: password reset email is not yet implemented in the backend.
            // This shows a friendly message for now.
            statusDiv.style.display      = 'block';
            statusDiv.style.background   = '#e0f0ff';
            statusDiv.style.color        = '#004080';
            statusDiv.style.border       = '1px solid #4da6ff';
            statusDiv.textContent        = 'If that email exists in our system, a reset link has been sent.';
        });
    </script>
</body>
</html>
