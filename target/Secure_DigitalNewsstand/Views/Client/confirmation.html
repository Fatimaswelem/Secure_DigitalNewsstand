<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmation - Digital Newsstand</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/confirmation.css">
</head>
<body>
<header>
    <nav>
        <div class="logo">Digital Platform</div>
        <div class="nav-links"><a href="#" id="logoutBtn">Logout</a></div>
    </nav>
</header>

<div class="checkout-panel">
    <div class="panel-body">
        <h2 class="title">Checkout here!</h2>
        <div class="progress-bar">
            <div class="step active"></div>
            <div class="step"></div>
            <div class="step"></div>
            <div class="step"></div>
        </div>
        <div class="info">
            <div class="column-2">
                <label for="firs-name">Name</label>
                <input type="text" id="firs-name" />
            </div>
            <div class="column-2">
                <label for="promo">Promocode</label>
                <input type="text" id="promo"/>
            </div>
            <div class="column-2">
                <label for="email">Email</label>
                <input type="email" id="email"/>
            </div>
            <div class="column-2">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" />
            </div>
        </div>
        <div class="price">
            <div class="section">
                <h3 id="planName">Selected Plan</h3>
                <div class="row"><span>Price</span><span class="action" id="planPrice">-</span></div>
            </div>
        </div>
    </div>
    <div class="panel-footer">
        <a href="subscription.html"><button class="btn back-btn">Back</button></a>
        <a href="pay.html"><button class="btn next-btn">Next Step</button></a>
    </div>
</div>

<footer>
    <div class="footer-bottom"><p>&copy; 2024 Digital Platform. All Rights Reserved</p></div>
</footer>

<script>
    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
        e.preventDefault();
        await fetch('/Secure_DigitalNewsstand/auth/logout', { method: 'POST', credentials: 'include' });
        window.location.href = '../Auth/index.html';
    });
</script>
<script src="../assets/js/confirmation.js"></script>
</body>
</html>
