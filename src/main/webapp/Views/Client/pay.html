<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Digital Newsstand</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/pay.css">
</head>
<body>
<header>
    <nav>
        <div class="logo">Digital Platform</div>
        <div class="nav-links"><a href="#" id="logoutBtn">Logout</a></div>
    </nav>
</header>

<div class="checkout-panel">
    <div class="panel-body">
        <h2 class="title">Checkout here!</h2>
        <div class="progress-bar">
            <div class="step active"></div>
            <div class="step active"></div>
            <div class="step"></div>
            <div class="step"></div>
        </div>
        <div class="payment-method">
            <label for="card" class="method card">
                <div class="card-logos">
                    <img src="https://designmodo.com/demo/checkout-panel/img/visa_logo.png"/>
                    <img src="https://designmodo.com/demo/checkout-panel/img/mastercard_logo.png"/>
                </div>
                <div class="radio-input">
                    <input id="card" type="radio" name="payment" checked>
                    Pay with credit card
                </div>
            </label>
            <label for="paypal" class="method paypal">
                <img src="https://designmodo.com/demo/checkout-panel/img/paypal_logo.png"/>
                <div class="radio-input">
                    <input id="paypal" type="radio" name="payment">
                    Pay with PayPal
                </div>
            </label>
        </div>
        <div class="input-fields">
            <div class="column-1">
                <label for="cardholder">Cardholder Name</label>
                <input type="text" id="cardholder" />
                <div class="small-inputs">
                    <div>
                        <label for="date">Valid date</label>
                        <input type="text" id="date" placeholder="MM/YY"/>
                    </div>
                    <div>
                        <label for="verification">CVV / CVC *</label>
                        <input type="password" id="verification"/>
                    </div>
                </div>
            </div>
            <div class="column-2">
                <label for="cardnumber">Card Number</label>
                <input type="password" id="cardnumber"/>
                <span class="info">* CVV or CVC is the card security code, unique three digits number on the back of your card.</span>
            </div>
        </div>
    </div>
    <div class="panel-footer">
        <a href="confirmation.html"><button class="btn back-btn">Back</button></a>
        <a href="finish.html"><button class="btn next-btn">Next Step</button></a>
    </div>
</div>

<footer>
    <div class="footer-bottom"><p>&copy; 2024 Digital Platform. All Rights Reserved</p></div>
</footer>

<script>
    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
        e.preventDefault();
        await fetch('/Secure_DigitalNewsstand/auth/logout', { method: 'POST', credentials: 'include' });
        window.location.href = '../Auth/index.html';
    });
</script>
<script src="../assets/js/pay.js"></script>
</body>
</html>
